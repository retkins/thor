[package]
name = "thor"
version = "0.1.0"
description = "Approximate Biot-Savart Law integration in near-linear time"
edition = "2024"

[dependencies]
numpy = {version = "0.27.1", optional=true}
pyo3 = { version = "0.27.2", features = ["extension-module"] , optional=true}

# Enable features with the flag: --features python
[features]
default = [] 
python = ["numpy", "pyo3"]

[lib]
name = "thor" 
crate-type = ["cdylib"]

[profile.release]
opt-level = 3
lto = "fat" 
codegen-units = 1