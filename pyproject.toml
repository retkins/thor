[project]
name = "thor"
version = "0.1.0"
description = "Approximate Biot-Savart Law integration in near-linear time"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "matplotlib>=3.10",
    "numpy>=2.4.1",
    "pytest>=9.0.2",
]

[project.optional-dependencies]
mesh = [
    "gmsh>=4.15"
]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[tool.maturin]
python-source = "."  
module-name = "thor._thor" 
features = ["python", "parallel"]